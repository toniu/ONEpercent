name: Deploy to Cloudflare Pages (debug)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  debug-cloudflare:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: "Debug: verify secrets present + list Pages projects (via API)"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          echo "Checking that secrets are present (not printing values)..."
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "ERROR: CLOUDFLARE_API_TOKEN is empty/missing"
            exit 1
          fi
          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "ERROR: CLOUDFLARE_ACCOUNT_ID is empty/missing"
            exit 1
          fi
          echo "OK: token present"
          echo "OK: account id present (length = ${#CLOUDFLARE_ACCOUNT_ID})"

          echo ""
          echo "== Token verify =="
          curl -sS -X GET "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json"
          echo ""

          echo ""
          echo "== Pages projects for account: $CLOUDFLARE_ACCOUNT_ID =="
          curl -sS -X GET "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json"
          echo ""
